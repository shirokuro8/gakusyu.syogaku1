<title>べんきょうクエスト</title>
<!--
═══════════════════════════════════════════════════════════════
 べんきょうクエスト v2  —  小1〜小4 学習アプリ（依存なし・複数ファイル構成）
 ─────────────────────────────────────────────────────────────
 ■ ファイル構成:
   css/style.css        … 見た目（全画面共通）
   js/data-kanji.js      … 国語データ（漢字・ひらがな・カタカナ・反対語・ローマ字・ことわざ）
   js/data-trivia.js     … 社会・理科・図形の一問一答データ
   js/generators.js      … 出題ロジック（上記データ or 手続き生成で問題をつくる関数）
   js/app.js             … 学年/ステージ定義・画面描画・保存・ゲームひろば・ぶつりラボ（メニューのみ）
   games/xxx.html        … ゲームひろばの各ゲーム本体（1ゲーム=1ファイル、iframeで開く）
   physics/xxx.html      … ぶつりラボの各シミュレーション本体（1コンテンツ=1ファイル、iframeで開く）
 ■ 学年を追加するには:
   1) js/app.js の GRADES に {id:'g5', label:'5ねんせい', stages:[...]} を追加
   2) 各 stage は {id, name, emoji, subject:'kokugo'|'sansu'|'shakai'|'rika'|'eigo', time:秒, gen:関数, count?:問題数}
      gen() は {q:問題文, choices:[4つ], answer:正解index, big:大表示文字(任意)} を返す
      count を付けると その面だけ 問題数を変えられる（例: 文章題は少なめ&長め）
      新しい subject を追加した場合は css/style.css に --色変数 と .stage.xxx、
      js/app.js の renderHome() の secRow(...) 呼び出しも 追加すること。
 ■ 新しい出題データ/ロジックを追加するには:
   固定の一問一答データは js/data-kanji.js か js/data-trivia.js に追加し、
   それを使う生成関数を js/generators.js に書いてから、js/app.js の GRADES で参照する。
 ■ ゲームチケット（ゲームばかり遊ばない仕組み）:
   ・通常のクイズをクリアすると付与。付与式は finishQuiz()（js/app.js）を参照。
   ・まちがいノート（復習クイズ）は、まちがえた問題を WRONG_NOTE_GOAL 問（既定5問）
     正解するたびに 1まい付与（grantWrongNoteTickets()、js/app.js）。
   1まいで TICKET_LIVES 回（=ゲームオーバー3回）まで遊べる。上限 MAX_TICKETS。
   対象は「ゲームひろば」内の すべてのゲーム（EXTRA_GAMESのiframe外部ゲーム）。
   ぶつりラボは学習用シミュレーションのため対象外（チケット不要・回数制限なし）。
 ■ ゲームを追加するには:
   1) games/xxx.html として1ファイルで完結するゲームを作る（見た目・操作・スコア表示すべて内包）
   2) js/app.js の EXTRA_GAMES に {title, emoji, src:'games/xxx.html'} を追加（iframeで開く）
   ※ ゲーム側は「本当のゲームオーバー」の瞬間に
      window.parent.postMessage({type:'BQ_GAME_OVER', game:'xxx'}, '*')
      を送る必要がある（openExt() がこれを受け取ってライフを1つ消費する）。
      内部ライフ制のゲーム（マリオ風など）は内部ライフが尽きた「本当の」ゲームオーバーの
      タイミングでのみ送ること（一時的な被弾/ミスでは送らない）。
 ■ ぶつりラボにシミュレーションを追加するには:
   1) physics/xxx.html として1ファイルで完結するシミュレーションを作る
   2) js/app.js の PHYSICS_SIMS に {title, emoji, tag, src:'physics/xxx.html'} を追加（iframeで開く）
   ※ チケット/ライフ管理は不要（openPhysicsSim() は閉じるボタンのみのシンプルなモーダル）。
═══════════════════════════════════════════════════════════════
-->

<body data-grade="g1">
<div id="app"></div>
<script src="js/data-kanji.js"></script>
<script src="js/data-trivia.js"></script>
<script src="js/generators.js"></script>
<script src="js/app.js"></script>
</body>
</html>
