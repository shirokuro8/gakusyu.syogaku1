<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>べんきょうクエスト</title>
<!--
═══════════════════════════════════════════════════════════════
 べんきょうクエスト v2  —  小1・小2 学習アプリ（単体HTML / 依存なし）
 ─────────────────────────────────────────────────────────────
 ■ 学年を追加するには:
   1) 下の GRADES に {id:'g3', label:'3ねんせい', theme:'#..', stages:[...]} を追加
   2) 各 stage は {id, name, emoji, subject:'kokugo'|'sansu', time:秒, gen:関数}
      gen() は {q:問題文, choices:[4つ], answer:正解index, big:大表示文字(任意)} を返す
 ■ ゲームを追加するには:
   EXTRA_GAMES に {title, emoji, src:'games/xxx.html'} を追加（iframeで開く）
   ※ 物理演算シミュレーション等は別HTMLで作って games/ フォルダに置くだけ
═══════════════════════════════════════════════════════════════
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#3a4250; --ink2:#7b8494; --paper:#f2f8fb; --card:#ffffff;
  --line:#dfe9ef; --star:#ffc53d; --ok:#3ecf8e; --ng:#ff7a7a;
  --theme:#ff6b8a; --theme-soft:#ffe9ee;      /* 1ねんせい: さくら */
  --kokugo:#ff8fab; --sansu:#5aa9f5; --fun:#8bc98b;
  --r:22px; --shadow:0 4px 14px rgba(60,80,110,.10);
}
[data-grade="g2"]{ --theme:#4a90e2; --theme-soft:#e3effc; }  /* 2ねんせい: そら */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
@media(min-width:1200px){html{font-size:18px}}
@media(min-width:1900px){html{font-size:24px}}   /* TVブラウザ想定 */
body{
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN','Yu Gothic',sans-serif;
  background:var(--paper); color:var(--ink); min-height:100vh;
  background-image:radial-gradient(circle at 20% 10%, #fff8 0 20%, transparent 21%),
    linear-gradient(var(--paper),var(--paper));
  user-select:none;
}
#app{max-width:900px;margin:0 auto;padding:1rem 1rem 3rem}
button{font:inherit;color:inherit;border:none;background:none;cursor:pointer}
.focusable:focus-visible, .focusable.tv-focus{
  outline:5px solid var(--theme); outline-offset:3px; border-radius:var(--r);
}
/* ── header ── */
.top{display:flex;align-items:center;justify-content:space-between;padding:.4rem .2rem 1rem}
.logo{font-weight:800;font-size:1.35rem;letter-spacing:.02em}
.logo span{color:var(--theme)}
.star-chip{background:var(--card);border-radius:99px;box-shadow:var(--shadow);
  padding:.35rem .9rem;font-weight:800;font-size:1.05rem}
.star-chip em{font-style:normal;color:var(--star)}
/* ── grade tabs ── */
.tabs{display:flex;gap:.7rem;margin-bottom:1rem}
.tab{flex:1;padding:.9rem;border-radius:var(--r);background:var(--card);
  box-shadow:var(--shadow);font-weight:800;font-size:1.15rem;text-align:center;
  border:3px solid transparent;color:var(--ink2)}
.tab.on{border-color:var(--theme);color:var(--theme);background:var(--theme-soft)}
/* ── dashboard ── */
.dash{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:1.1rem;display:flex;gap:1rem;align-items:center;margin-bottom:1.1rem}
.ring-wrap{position:relative;width:6.2rem;height:6.2rem;flex-shrink:0}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{stroke:var(--line)} .ring-fg{stroke:var(--theme);transition:stroke-dashoffset .8s ease}
.ring-num{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-weight:800}
.ring-num b{font-size:1.5rem;line-height:1}.ring-num small{font-size:.65rem;color:var(--ink2)}
.dash-stats{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem}
.dstat{background:var(--paper);border-radius:14px;padding:.55rem .3rem;text-align:center}
.dstat b{display:block;font-size:1.25rem;font-weight:800}
.dstat small{font-size:.68rem;color:var(--ink2);font-weight:700}
.greet{font-weight:800;margin:.2rem .2rem .8rem;font-size:1.05rem}
/* ── sections & stage grid ── */
.sec-h{display:flex;align-items:center;gap:.5rem;margin:1.2rem .2rem .6rem;font-weight:800}
.sec-h .bar{width:.45rem;height:1.3rem;border-radius:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.8rem}
@media(min-width:1900px){.grid{grid-template-columns:repeat(3,1fr)}}
.stage{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:1rem .6rem;text-align:center;position:relative;
  transition:transform .12s;border-bottom:5px solid var(--line)}
.stage:active{transform:scale(.96)}
.stage .em{font-size:2.3rem;display:block;margin-bottom:.3rem}
.stage .nm{font-weight:800;font-size:.98rem}
.stage .st{margin-top:.3rem;font-size:.9rem;letter-spacing:.1em}
.stage.kokugo{border-bottom-color:var(--kokugo)}
.stage.sansu{border-bottom-color:var(--sansu)}
.stage.fun{border-bottom-color:var(--fun)}
.rowbtns{display:flex;gap:.8rem;margin-top:1.3rem}
.bigbtn{flex:1;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:1rem;font-weight:800;font-size:1rem;text-align:center}
/* ── quiz ── */
.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;font-weight:800}
.qcount{color:var(--ink2)}
.timerbar{height:.9rem;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:1rem}
.timerbar i{display:block;height:100%;background:var(--ok);border-radius:99px;
  transition:width .1s linear, background .3s}
.qcard{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:1.4rem 1rem;text-align:center;margin-bottom:1.1rem;min-height:9rem;
  display:flex;flex-direction:column;justify-content:center}
.qtext{font-weight:800;font-size:1.25rem;line-height:1.6}
.qbig{font-size:3.4rem;font-weight:800;margin-top:.4rem;line-height:1.2}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.choice{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:1.15rem .5rem;font-weight:800;font-size:1.35rem;min-height:4.2rem;
  border:4px solid transparent;transition:transform .1s}
.choice:active{transform:scale(.96)}
.choice.ok{border-color:var(--ok);background:#eafff4}
.choice.ng{border-color:var(--ng);background:#fff0f0}
.feedback{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:7rem;pointer-events:none;z-index:50;animation:pop .5s}
@keyframes pop{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.15);opacity:1}100%{transform:scale(1)}}
/* ── result ── */
.res{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:1.6rem 1rem;text-align:center}
.res h2{font-size:1.4rem;margin-bottom:.6rem}
.res-stars{font-size:2.8rem;letter-spacing:.1em;margin:.4rem 0}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin:1rem 0}
.rstat{background:var(--paper);border-radius:14px;padding:.7rem .3rem}
.rstat b{display:block;font-size:1.4rem;font-weight:800}
.rstat small{font-size:.7rem;color:var(--ink2);font-weight:700}
/* ── record ── */
.rec-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:1rem;margin-bottom:1rem}
.rec-row{display:flex;align-items:center;gap:.6rem;padding:.45rem 0;font-weight:700;font-size:.92rem}
.rec-row .nm{width:9.5rem;flex-shrink:0}
.bar-bg{flex:1;height:.85rem;background:var(--line);border-radius:99px;overflow:hidden}
.bar-fg{height:100%;border-radius:99px;background:var(--theme)}
.rec-row .pc{width:3.2rem;text-align:right;color:var(--ink2)}
.hist{font-size:.85rem;color:var(--ink2);font-weight:700;padding:.3rem 0;border-bottom:1px dashed var(--line)}
.back{display:inline-block;margin-bottom:1rem;background:var(--card);border-radius:99px;
  box-shadow:var(--shadow);padding:.55rem 1.3rem;font-weight:800}
.pagetitle{font-size:1.3rem;font-weight:800;margin:.2rem 0 1rem;text-align:center}
/* ── game canvas ── */
#gameCv{display:block;width:100%;border-radius:var(--r);background:#0d1b3d;
  box-shadow:var(--shadow);touch-action:manipulation}
.game-hint{text-align:center;font-weight:800;color:var(--ink2);margin-top:.7rem;font-size:.9rem}
.modal{position:fixed;inset:0;background:rgba(30,40,60,.55);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:1rem}
.modal iframe{width:min(96vw,900px);height:min(88vh,700px);border:none;border-radius:var(--r);background:#fff}
.modal .close{position:absolute;top:1rem;right:1rem;background:#fff;border-radius:99px;
  width:3rem;height:3rem;font-size:1.4rem;font-weight:800;box-shadow:var(--shadow)}
.empty{text-align:center;color:var(--ink2);font-weight:700;padding:1.5rem 0}
/* ── まちがいノート バナー（ダッシュボードの近く） ── */
.review-card{display:flex;align-items:center;gap:.9rem;background:var(--card);
  border-radius:var(--r);box-shadow:var(--shadow);padding:.8rem 1rem;margin-bottom:1.1rem;
  border-left:7px solid var(--ng);text-align:left;width:100%}
.review-card .em{font-size:2rem;flex-shrink:0;line-height:1}
.review-card .tx{flex:1;min-width:0}
.review-card .tx b{font-size:1.02rem;display:block}
.review-card .tx small{display:block;color:var(--ink2);font-weight:700;font-size:.78rem;margin-top:.1rem}
.review-card .go{background:var(--ng);color:#fff;border-radius:99px;padding:.55rem 1rem;
  font-weight:800;flex-shrink:0;font-size:.92rem;white-space:nowrap}
.review-card.done{border-left-color:var(--ok)}
/* ── あそび用キャンバス（ゲーム＆シミュレーション共通） ── */
canvas.playcv{display:block;width:100%;border-radius:var(--r);background:#0d1b3d;
  box-shadow:var(--shadow);touch-action:none}
.toolbar{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:.8rem}
.toolbar button{flex:1;min-width:6.5rem;background:var(--card);border-radius:99px;
  box-shadow:var(--shadow);padding:.65rem .7rem;font-weight:800;font-size:.95rem;text-align:center;
  border:3px solid transparent}
.toolbar button.on{border-color:var(--theme);color:var(--theme)}
.sim-desc{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:.75rem .95rem;margin-top:.7rem;font-size:.85rem;font-weight:700;color:var(--ink2);line-height:1.6}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body data-grade="g1">
<div id="app"></div>
<script>
"use strict";
/* ================= util ================= */
const $=s=>document.querySelector(s);
const R=n=>Math.floor(Math.random()*n);
const pick=a=>a[R(a.length)];
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=R(i+1);[a[i],a[j]]=[a[j],a[i]]}return a};
function mk(q,correct,wrongs,big){ // 選択肢組立て（重複除去・数値は不足分を自動補充）
  const ws=[...new Set(wrongs.map(String).filter(w=>w!==String(correct)))].slice(0,3);
  const n=Number(correct);let g=0;
  while(ws.length<3&&!isNaN(n)&&g++<60){
    const w=String(n+(R(9)+1)*(R(2)?1:-1));
    if(Number(w)>=0&&w!==String(correct)&&!ws.includes(w))ws.push(w);}
  const cs=shuffle([String(correct),...ws]);
  return {q,choices:cs,answer:cs.indexOf(String(correct)),big};
}
function numWrongs(ans,spread=3){const s=new Set();let g=0;
  while(s.size<3&&g++<60){const d=(R(spread)+1)*(R(2)?1:-1);const w=ans+d;if(w>=0&&w!==ans)s.add(w)}
  return [...s];}
/* ================= 問題プール（[表記, よみ] ペア → よみ/かき両方を自動生成） ================= */
const KANJI1=[["山","やま"],["川","かわ"],["空","そら"],["月","つき"],["火","ひ"],["水","みず"],["木","き"],["金","かね"],["土","つち"],["日","にち"],["花","はな"],["犬","いぬ"],["虫","むし"],["森","もり"],["林","はやし"],["石","いし"],["雨","あめ"],["田","た"],["竹","たけ"],["貝","かい"],["手","て"],["足","あし"],["目","め"],["耳","みみ"],["口","くち"],["男","おとこ"],["女","おんな"],["子","こ"],["先生","せんせい"],["学校","がっこう"],["百","ひゃく"],["千","せん"],["円","えん"],["車","くるま"],["赤","あか"],["青","あお"],["白","しろ"],["音","おと"],["糸","いと"],["王","おう"]];
const KANJI2=[["春","はる"],["夏","なつ"],["秋","あき"],["冬","ふゆ"],["朝","あさ"],["昼","ひる"],["夜","よる"],["雪","ゆき"],["風","かぜ"],["星","ほし"],["海","うみ"],["池","いけ"],["谷","たに"],["野原","のはら"],["岩","いわ"],["馬","うま"],["鳥","とり"],["魚","さかな"],["牛","うし"],["羽","はね"],["顔","かお"],["頭","あたま"],["首","くび"],["心","こころ"],["声","こえ"],["親","おや"],["兄","あに"],["姉","あね"],["弟","おとうと"],["妹","いもうと"],["友","とも"],["教室","きょうしつ"],["算数","さんすう"],["国語","こくご"],["図工","ずこう"],["電車","でんしゃ"],["汽車","きしゃ"],["店","みせ"],["寺","てら"],["門","もん"],["刀","かたな"],["弓","ゆみ"],["矢","や"],["谷川","たにがわ"],["公園","こうえん"],["時間","じかん"],["午前","ごぜん"],["午後","ごご"],["毎日","まいにち"],["天気","てんき"]];
function kanjiRead(pool){const[k,y]=pick(pool);
  return mk(`この かんじの よみかたは？`,y,shuffle([...new Set(pool.map(p=>p[1]))].filter(r=>r!==y)).slice(0,3),k);}
function kanjiWrite(pool){const[k,y]=pick(pool);
  return mk(`「${y}」を かんじで かくと？`,k,shuffle(pool.filter(p=>p[0]!==k)).slice(0,3).map(p=>p[0]));}
const HIRA=[["🍎","りんご"],["🐶","いぬ"],["🐱","ねこ"],["🍌","ばなな"],["🌸","さくら"],["🚗","くるま"],["🐘","ぞう"],["🍙","おにぎり"],["⭐","ほし"],["🌈","にじ"],["🐟","さかな"],["☂️","かさ"],["👟","くつ"],["📖","ほん"],["🍓","いちご"],["🐸","かえる"],["✏️","えんぴつ"],["🎒","らんどせる"],["🌻","ひまわり"],["🍉","すいか"]];
const KATA=[["🍌","バナナ"],["🍅","トマト"],["🍞","パン"],["🚌","バス"],["🎹","ピアノ"],["🦁","ライオン"],["🐼","パンダ"],["🍦","アイス"],["📺","テレビ"],["🚪","ドア"],["🧃","ジュース"],["🍰","ケーキ"],["⚽","サッカー"],["🚀","ロケット"],["🍫","チョコ"],["🐨","コアラ"],["🎸","ギター"],["🍜","ラーメン"]];
function emojiWord(pool,label){const[e,w]=pick(pool);
  return mk(`この えを ${label}で かくと？`,w,shuffle(pool.filter(p=>p[1]!==w)).slice(0,3).map(p=>p[1]),e);}
const OPPO=[["たかい","ひくい"],["おおきい","ちいさい"],["ながい","みじかい"],["あつい","さむい"],["はやい","おそい"],["おもい","かるい"],["あかるい","くらい"],["ひろい","せまい"],["つよい","よわい"],["ふとい","ほそい"],["あたらしい","ふるい"],["ちかい","とおい"],["おおい","すくない"],["かたい","やわらかい"]];
function opposite(){const[a,b]=pick(OPPO);const[q,ans]=R(2)?[a,b]:[b,a];
  return mk(`「${q}」の はんたいの ことばは？`,ans,shuffle(OPPO.flat().filter(w=>w!==ans&&w!==q)).slice(0,3));}
/* ── 手続き生成（算数） ── */
function g1calc(){if(R(2)){const a=R(9)+1,b=R(10-a)+0;return mk(`${a} ＋ ${b} ＝ ？`,a+b,numWrongs(a+b))}
  const a=R(9)+2,b=R(a-1)+1;return mk(`${a} － ${b} ＝ ？`,a-b,numWrongs(a-b));}
function g1carry(){if(R(2)){let a=R(6)+4,b=R(6)+4;if(a+b<11)b=11-a+R(4);return mk(`${a} ＋ ${b} ＝ ？`,a+b,numWrongs(a+b))}
  const ans=R(8)+2,b=R(6)+4,a=ans+b;return mk(`${a} － ${b} ＝ ？`,ans,numWrongs(ans));}
function g1three(){const t=R(3);let a,b,c,ans,op;
  if(t===0){a=R(4)+1;b=R(4)+1;c=R(4)+1;ans=a+b+c;op=`${a} ＋ ${b} ＋ ${c}`}
  else if(t===1){a=R(5)+5;b=R(3)+1;c=R(3)+1;ans=a-b-c;op=`${a} － ${b} － ${c}`}
  else{a=R(5)+3;b=R(4)+1;c=R(4)+1;ans=a+b-c;op=`${a} ＋ ${b} － ${c}`}
  return mk(`${op} ＝ ？`,ans,numWrongs(ans));}
const CLK=["🕛","🕐","🕑","🕒","🕓","🕔","🕕","🕖","🕗","🕘","🕙","🕚"];
const CLKH=["🕧","🕜","🕝","🕞","🕟","🕠","🕡","🕢","🕣","🕤","🕥","🕦"];
function g1clock(){const h=R(12);const half=R(2);
  const e=half?CLKH[h]:CLK[h];const hh=h===0?12:h;
  const ans=half?`${hh}じはん`:`${hh}じ`;
  const ws=[];while(ws.length<3){const w=R(12)+1;const s=half&&R(2)?`${w}じ`:half?`${w}じはん`:R(2)?`${w}じはん`:`${w}じ`;if(s!==ans&&!ws.includes(s))ws.push(s)}
  return mk(`この とけいは なんじ？`,ans,ws,e);}
function kuku(){const a=R(9)+1,b=R(9)+1,ans=a*b;
  return mk(`${a} × ${b} ＝ ？`,ans,[ans+a,ans-a,ans+b,ans-b,ans+1].filter(v=>v>0&&v!==ans));}
function hissan(){if(R(2)){const a=R(80)+10,b=R(90-Math.floor(a/2))+10,ans=a+b;
    return mk(`ひっさんで けいさん\n${a} ＋ ${b} ＝ ？`,ans,numWrongs(ans,10))}
  const b=R(50)+10,ans=R(50)+5,a=b+ans;
  return mk(`ひっさんで けいさん\n${a} － ${b} ＝ ？`,ans,numWrongs(ans,10));}
function g2len(){const t=R(3);
  if(t===0){const c=R(9)+1;return mk(`${c}cm ＝ なんmm？`,`${c*10}mm`,[`${c}mm`,`${c*100}mm`,`${c*10+5}mm`])}
  if(t===1){const m=R(5)+1;return mk(`${m}m ＝ なんcm？`,`${m*100}cm`,[`${m*10}cm`,`${m*1000}cm`,`${m*100+10}cm`])}
  const c=R(8)+1,m=R(8)+1;return mk(`${c}cm${m}mm ＝ なんmm？`,`${c*10+m}mm`,[`${c+m}mm`,`${c*10+m+10}mm`,`${c*100+m}mm`]);}
function g2vol(){const t=R(3);
  if(t===0){const l=R(5)+1;return mk(`${l}L ＝ なんdL？`,`${l*10}dL`,[`${l}dL`,`${l*100}dL`,`${l*10+5}dL`])}
  if(t===1){const l=R(3)+1;return mk(`${l}L ＝ なんmL？`,`${l*1000}mL`,[`${l*100}mL`,`${l*10}mL`,`${l*1000+100}mL`])}
  const d=R(9)+1;return mk(`${d}dL ＝ なんmL？`,`${d*100}mL`,[`${d*10}mL`,`${d*1000}mL`,`${d*100+50}mL`]);}
function g2time(){const t=R(3);
  if(t===0){const h=R(11)+1,m=pick([15,30,45]);const eh=(h+Math.floor(m/60))%12||12;
    return mk(`${h}じから ${m}ぷんあとは？`,m===60?`${eh}じ`:`${h}じ${m}ぷん`,[`${h}じ${m+15>=60?"":m+15+"ぷん"}`||`${h}じ`,`${(h%12)+1}じ${m}ぷん`,`${h}じ${m-10}ぷん`].map(s=>s))}
  if(t===1){const a=R(9)+1,d=R(3)+1;return mk(`${a}じから ${a+d}じまで なんじかん？`,`${d}じかん`,[`${d+1}じかん`,`${d-1<=0?d+2:d-1}じかん`,`${d+3}じかん`])}
  const m=pick([30,40,50]);const h=R(10)+1;
  return mk(`${h}じ${m}ぷんの ${60-m}ぷんあとは？`,`${h+1}じ`,[`${h}じ`,`${h+2}じ`,`${h+1}じ${30}ぷん`]);}
function g2num(){const t=R(3);

function startTimer(sec){stopTimer();const bar=$("#tbar");const t0=Date.now();

    bar.style.background=r>.5?"var(--ok)":r>.25?"var(--star)":"var(--ng)";},100);}
function stopTimer(){if(timerId){clearInterval(timerId);timerId=null}}
function answer(ci){stopTimer();
  const q=quiz.qs[quiz.i];const ok=ci===q.answer;
  document.querySelectorAll(".choice").forEach((b,bi)=>{
    if(bi===q.answer)b.classList.add("ok");

  if(ok){sOK();quiz.cor++;
    const el=(Date.now()-quiz.qStart)/1000;const lim=quiz.stage.time;
    quiz.score+=100+Math.max(0,Math.round((lim-el)/lim*50));}
  else{sNG();quiz.wrongList.push({q,stageId:quiz.stage.id});}
  setTimeout(()=>{fb.remove();
    quiz.i++;

function finishQuiz(){
  const {stage,qs,cor,score,wrongList}=quiz;
  const acc=Math.round(cor/qs.length*100);
  const stars=acc>=90?3:acc>=70?2:acc>=50?1:0;
  bumpStreak();

    DB.stars[stage.id]=Math.max(DB.stars[stage.id]||0,stars);
    DB.best[stage.id]=Math.max(DB.best[stage.id]||0,score);
    const st=DB.stats[stage.id]||{c:0,t:0};st.c+=cor;st.t+=qs.length;DB.stats[stage.id]=st;
  }else{ // まちがいノート: 正解した問題はノートから除去
    const solved=new Set(qs.filter((q,i2)=>!wrongList.find(w=>w.q===q)).map(q=>q.q+(q.big||"")));
    DB.wrong=DB.wrong.filter(w=>!solved.has(w.q.q+(w.q.big||"")));
  }
  wrongList.forEach(w=>{if(DB.wrong.length<60&&!DB.wrong.find(x=>x.q.q===w.q.q&&x.q.big===w.q.big))DB.wrong.push(w)});
  DB.hist.unshift({d:today(),g:DB.grade,s:stage.name,acc,score,n:qs.length});

function renderRocket(){
  app.innerHTML=`
  <button class="back focusable" data-act="games">← もどる</button>
  <div class="pagetitle">🚀 ぴょんぴょんロケット</div>
  <canvas id="gameCv"></canvas>
  <div class="game-hint">タップ / スペースキー / 決定ボタンで ジャンプ！ ⭐のあいだを とおろう</div>`;
  const cv=$("#gameCv");const W=720,H=480;cv.width=W;cv.height=H;
  const ctx=cv.getContext("2d");
  let rocket={y:H/2,vy:0},gates=[],score=0,alive=false,started=false,frame=0;
  const stars=Array.from({length:40},()=>({x:R(W),y:R(H),r:Math.random()*1.6+.4,s:Math.random()*.6+.2}));
  function reset(){rocket={y:H/2,vy:0};gates=[];score=0;frame=0;alive=true;}
  function flap(){if(!started||!alive){reset();started=true;return}rocket.vy=-6.2;beep(660,.06);}
  cv.addEventListener("pointerdown",flap);
  window._gameKey=e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();flap()}};
  window.addEventListener("keydown",window._gameKey);
  function step(){
    ctx.fillStyle="#0d1b3d";ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{s.x-=s.s;if(s.x<0)s.x=W;ctx.fillStyle="#ffffffaa";
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill();});
    if(started&&alive){
      frame++;rocket.vy+=.32;rocket.y+=rocket.vy;
      if(frame%95===0){const gap=150,gy=R(H-gap-120)+60;gates.push({x:W+30,gy,gap,passed:false});}
      gates.forEach(g=>{g.x-=3.1;
        if(!g.passed&&g.x<120){g.passed=true;score++;sOK();}
        if(Math.abs(g.x-120)<34&&(rocket.y<g.gy||rocket.y>g.gy+g.gap))alive=false;});
      gates=gates.filter(g=>g.x>-60);
      if(rocket.y<10||rocket.y>H-10)alive=false;
      if(!alive){sNG();if(score>DB.gameBest){DB.gameBest=score;save()}}
    }
    gates.forEach(g=>{ctx.font="34px serif";ctx.textAlign="center";
      for(let y=20;y<g.gy-10;y+=46)ctx.fillText("⭐",g.x,y);
      for(let y=g.gy+g.gap+30;y<H;y+=46)ctx.fillText("⭐",g.x,y);});
    ctx.font="42px serif";ctx.textAlign="center";
    ctx.save();ctx.translate(120,rocket.y);ctx.rotate(Math.min(.6,Math.max(-.6,rocket.vy*.06)));
    ctx.fillText("🚀",0,14);ctx.restore();
    ctx.fillStyle="#fff";ctx.font="800 30px 'M PLUS Rounded 1c',sans-serif";
    ctx.textAlign="left";ctx.fillText("スコア "+score,18,42);
    ctx.textAlign="right";ctx.fillText("ベスト "+DB.gameBest,W-18,42);
    if(!started||!alive){ctx.textAlign="center";ctx.font="800 34px 'M PLUS Rounded 1c',sans-serif";
      ctx.fillText(started?"ゲームオーバー":"🚀 ぴょんぴょんロケット",W/2,H/2-20);
      ctx.font="800 22px 'M PLUS Rounded 1c',sans-serif";
      ctx.fillText("タップして スタート！",W/2,H/2+24);}
    gameLoop=requestAnimationFrame(step);}
  step();
}

          ctx.lineTo(cx+b.tr[i][0],cy+b.tr[i][1]);ctx.stroke();}}});
    bodies.forEach(b=>{const X=cx+b.x,Y=cy+b.y;
      if(b.fixed){const gr=ctx.createRadialGradient(X,Y,2,X,Y,b.rad*2.4);
        gr.addColorStop(0,"#fff6c8");gr.addColorStop(.5,"#ffcc33");gr.addColorStop(1,"#ffcc3300");
        ctx.fillStyle=gr;ctx.beginPath();ctx.arc(X,Y,b.rad*2.4,0,7);ctx.fill();
        ctx.fillStyle="#fff2b0";ctx.beginPath();ctx.arc(X,Y,b.rad,0,7);ctx.fill();}
      else{ctx.fillStyle=`hsl(${b.hue},85%,62%)`;ctx.beginPath();ctx.arc(X,Y,b.rad,0,7);ctx.fill();}});
    if(aiming){ctx.strokeStyle="#ffffffcc";ctx.lineWidth=3;ctx.setLineDash([6,6]);
      ctx.beginPath();ctx.moveTo(cx+ax,cy+ay);ctx.lineTo(cx+bx,cy+by);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(cx+ax,cy+ay,5,0,7);ctx.fill();}
    ctx.fillStyle="#cfe0ff";ctx.font="800 18px 'M PLUS Rounded 1c',sans-serif";ctx.textAlign="left";
    ctx.fillText("ほし: "+bodies.length,16,30);
    gameLoop=requestAnimationFrame(frame);}
  frame();
}
/* ================= イベント委譲 ================= */
app.addEventListener("click",e=>{
  const b=e.target.closest("[data-act]");if(!b)return;
  const act=b.dataset.act;
  if(act==="grade"){DB.grade=b.dataset.id;save();renderHome();}
  else if(act==="stage"){const s=curGrade().stages.find(x=>x.id===b.dataset.id)
    ||GRADES.flatMap(g=>g.stages).find(x=>x.id===b.dataset.id);go("quiz",s);}
  else if(act==="ans")answer(+b.dataset.i);
  else if(act==="home")go("home");
  else if(act==="retry")go("quiz",window._lastStage);
  else if(act==="record")go("record");
  else if(act==="games")go("games");
  else if(act==="rocket")go("rocket");
  else if(act==="runner")go("runner");
  else if(act==="physics")go("physics");
  else if(act==="pendulum")go("pendulum");
  else if(act==="fluid")go("fluid");
  else if(act==="orbit")go("orbit");
  else if(act==="review")go("review");
  else if(act==="extgame")openExt(+b.dataset.i);
  else if(act==="mute"){DB.mute=!DB.mute;save();renderHome();}
});
/* ================= TVリモコン/キーボード 空間ナビゲーション ================= */
document.addEventListener("keydown",e=>{
  if(window._gameKey&&(e.key===" "||e.key==="Enter"))return; // ゲーム中は委譲
  const keys=["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Enter"];
  if(!keys.includes(e.key))return;
  const els=[...document.querySelectorAll(".focusable:not(:disabled)")];
  if(!els.length)return;
  let cur=document.activeElement;
  if(!els.includes(cur)){els[0].focus();return}
  if(e.key==="Enter")return; // ネイティブclickに任せる
  e.preventDefault();
  const cr=cur.getBoundingClientRect();
  const cx=cr.left+cr.width/2, cy=cr.top+cr.height/2;
  let best=null,bd=1e9;
  els.forEach(el=>{if(el===cur)return;
    const r=el.getBoundingClientRect();
    const x=r.left+r.width/2, y=r.top+r.height/2;
    const dx=x-cx, dy=y-cy;
    const dirOK=(e.key==="ArrowUp"&&dy<-5)||(e.key==="ArrowDown"&&dy>5)
      ||(e.key==="ArrowLeft"&&dx<-5)||(e.key==="ArrowRight"&&dx>5);
    if(!dirOK)return;
    const vert=e.key==="ArrowUp"||e.key==="ArrowDown";
    const d=vert?Math.abs(dy)+Math.abs(dx)*2.5:Math.abs(dx)+Math.abs(dy)*2.5;
    if(d<bd){bd=d;best=el}});
  if(best)best.focus();
});
/* ================= 起動 ================= */
renderHome();
</script>
