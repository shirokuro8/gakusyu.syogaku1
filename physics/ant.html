<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ありの えさはこび｜ぶつりラボ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script>window.LAB_WHY={q:"ありは どうやって、いちばん ちかい みちを みつけるのかな？"};</script>
<script src="_lab.js"></script>
<style>
  body{user-select:none;touch-action:none}
  html,body{height:100%;overflow:hidden}
  #app{height:100%;display:flex;flex-direction:column;gap:.5rem;padding:.6rem;overflow:hidden}
  .pagetitle{flex:0 0 auto;margin:0}
  .cv-wrap{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;position:relative}
  .cv-wrap canvas{max-width:100%;max-height:100%;cursor:crosshair}
  .toolbar{flex:0 0 auto;margin-top:0}
  .sim-desc{flex:0 0 auto;margin-top:0}
  .sliderline{display:flex;align-items:center;gap:.5rem;background:var(--card);border-radius:99px;
    box-shadow:var(--shadow);padding:.5rem 1rem;font-weight:800;font-size:.85rem;flex:1;min-width:9.5rem}
  .sliderline input[type=range]{flex:1;accent-color:var(--theme)}
</style>
</head>
<body>
<div id="app">
  <div class="pagetitle">🐜 ありの えさはこび</div>
  <div class="cv-wrap"><canvas id="gameCv" class="playcv"></canvas></div>
  <div class="toolbar">
    <label class="sliderline"><span>🐜 ありの かず</span><input type="range" class="focusable" id="antR" min="20" max="300" step="10" value="120"></label>
    <label class="sliderline"><span>⏩ はやさ</span><input type="range" class="focusable" id="spdR" min="1" max="5" step="1" value="2"></label>
  </div>
  <div class="toolbar">
    <button class="focusable" id="btnMoveNest">🏠 すを うごかす</button>
    <button class="focusable on" id="btnPhero">👃 におい ひょうじ</button>
    <button class="focusable" id="btnClearFood">🧹 えさを けす</button>
    <button class="focusable" id="btnReset">🔄 リセット</button>
  </div>
  <div class="sim-desc">まんなかの あなが「あり の す」だよ。あり は すから でて、えさを さがして あるきまわるよ。えさを みつけると、とおった みちに「におい」を のこしながら すに かえるよ。ほかの あり が その におい を たどって いくうちに、どんどん いちばん みじかい みちが できあがっていくよ。がめんを タップすると、そこに えさを おけるよ（なんかいでも おけるよ）。「🏠すを うごかす」を おしてから タップすると、す の ばしょを かえられるよ。</div>
</div>
<script>
(function(){
  const $=s=>document.querySelector(s);
  function rand(a,b){ return a + Math.random()*(b-a); }
  function clampi(v,lo,hi){ return v<lo?lo:(v>hi?hi:v); }
  function angleDiff(a,b){ let d=b-a; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2; return d; }

  const cv=$("#gameCv");const W=720,H=560;cv.width=W;cv.height=H;
  function fitCanvas(){
    const box=cv.parentElement.getBoundingClientRect();
    const scale=Math.min(box.width/W, box.height/H);
    cv.style.width=(W*scale)+"px"; cv.style.height=(H*scale)+"px";
  }
  window.addEventListener("resize",fitCanvas); fitCanvas();
  const ctx=cv.getContext("2d");
  function cvPos(e){const r=cv.getBoundingClientRect();
    return {x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)};}

  /* ===== フェロモン(におい)の グリッド：すへ かえる みち／えさへ むかう みち の 2まい ===== */
  const CELL=6, gridW=Math.ceil(W/CELL), gridH=Math.ceil(H/CELL);
  let homePhero=new Float32Array(gridW*gridH);
  let foodPhero=new Float32Array(gridW*gridH);
  const gridCanvas=document.createElement('canvas');
  gridCanvas.width=gridW; gridCanvas.height=gridH;
  const gctx=gridCanvas.getContext('2d');
  let imgData=gctx.createImageData(gridW,gridH);

  let nest={x:W/2,y:H*0.5,r:14};
  let foods=[];
  let ants=[];
  let delivered=0, showPhero=true, speedMult=2, moveNestMode=false;

  const DECAY=0.992, DEPOSIT=5, MAXP=220;
  const SENSOR_DIST=13, SENSOR_ANGLE=0.5, MAX_TURN=0.32, JITTER=0.28, SPEED=1.6;
  const EAT_R=9, NEST_R=nest.r+4;

  function idxAt(px,py){
    const gx=clampi(Math.floor(px/CELL),0,gridW-1), gy=clampi(Math.floor(py/CELL),0,gridH-1);
    return gy*gridW+gx;
  }
  function deposit(px,py,layer,amount){ const i=idxAt(px,py); layer[i]=Math.min(MAXP,layer[i]+amount); }
  function senseAt(x,y,angle,layer){
    const positions=[angle-SENSOR_ANGLE, angle, angle+SENSOR_ANGLE];
    return positions.map(ang=>{
      const sx=x+Math.cos(ang)*SENSOR_DIST, sy=y+Math.sin(ang)*SENSOR_DIST;
      if(sx<0||sx>=W||sy<0||sy>=H) return -1;
      return layer[idxAt(sx,sy)];
    });
  }

  function makeAnt(){
    const a=rand(0,Math.PI*2);
    return{ x:nest.x+Math.cos(a)*10, y:nest.y+Math.sin(a)*10, angle:a, state:'search' };
  }
  function initAnts(n){ ants=[]; for(let i=0;i<n;i++) ants.push(makeAnt()); }

  function stepAnt(ant){
    const followLayer=ant.state==='search'?foodPhero:homePhero;
    const depositLayer=ant.state==='search'?homePhero:foodPhero;
    const [L,C,R]=senseAt(ant.x,ant.y,ant.angle,followLayer);
    let turn=0;
    const maxSense=Math.max(L,C,R);
    if(maxSense>2){
      if(C>=L&&C>=R){ /* まっすぐ すすむ */ }
      else if(L>R) turn-=MAX_TURN*clampi((L-R)/40,0,1);
      else if(R>L) turn+=MAX_TURN*clampi((R-L)/40,0,1);
    }
    if(ant.state==='return'){
      const desired=Math.atan2(nest.y-ant.y,nest.x-ant.x);
      const d=angleDiff(ant.angle,desired);
      turn+=clampi(d,-MAX_TURN*0.6,MAX_TURN*0.6);
    }
    const jitterScale=maxSense>2?0.35:1;
    turn+=(Math.random()-0.5)*JITTER*jitterScale;
    ant.angle+=clampi(turn,-MAX_TURN,MAX_TURN);

    let nx=ant.x+Math.cos(ant.angle)*SPEED, ny=ant.y+Math.sin(ant.angle)*SPEED;
    if(nx<2){nx=2; ant.angle=Math.PI-ant.angle;}
    if(nx>W-2){nx=W-2; ant.angle=Math.PI-ant.angle;}
    if(ny<2){ny=2; ant.angle=-ant.angle;}
    if(ny>H-2){ny=H-2; ant.angle=-ant.angle;}
    ant.x=nx; ant.y=ny;

    deposit(ant.x,ant.y,depositLayer,DEPOSIT);

    if(ant.state==='search'){
      for(const f of foods){
        if(f.amount<=0)continue;
        const dx=ant.x-f.x, dy=ant.y-f.y;
        if(dx*dx+dy*dy<EAT_R*EAT_R){ f.amount-=1; ant.state='return'; ant.angle+=Math.PI; break; }
      }
    }else{
      const dx=ant.x-nest.x, dy=ant.y-nest.y;
      if(dx*dx+dy*dy<NEST_R*NEST_R){ delivered+=1; ant.state='search'; ant.angle+=Math.PI+rand(-0.6,0.6); }
    }
  }

  function decayPheromones(){
    for(let i=0;i<homePhero.length;i++){ homePhero[i]*=DECAY; foodPhero[i]*=DECAY; }
    foods=foods.filter(f=>f.amount>0);
  }

  function renderPheromone(){
    const data=imgData.data;
    for(let i=0;i<gridW*gridH;i++){
      const h=homePhero[i], f=foodPhero[i]; const o=i*4;
      const fr=Math.min(255,f*1.15), fg=Math.min(255,f*0.75), hb=Math.min(255,h*1.1);
      data[o]=Math.min(255,fr*0.85);
      data[o+1]=Math.min(255,fg*0.6+h*0.25);
      data[o+2]=Math.min(255,hb*0.9+f*0.1);
      data[o+3]=Math.min(255,Math.max(fr,fg,hb)*0.9);
    }
    gctx.putImageData(imgData,0,0);
  }

  function draw(){
    ctx.fillStyle="#1b140f"; ctx.fillRect(0,0,W,H);
    if(showPhero){
      renderPheromone();
      ctx.imageSmoothingEnabled=true; ctx.globalAlpha=1;
      ctx.drawImage(gridCanvas,0,0,W,H);
    }
    ctx.beginPath(); ctx.fillStyle="#0b0805"; ctx.arc(nest.x,nest.y,nest.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=moveNestMode?"#e0a339":"#c9b28a"; ctx.lineWidth=moveNestMode?3:1.5; ctx.stroke();
    ctx.fillStyle="#c9b28a"; ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.fillText('す',nest.x,nest.y+3);

    for(const f of foods){
      const r=4+Math.sqrt(f.amount)*0.9;
      const grad=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,r);
      grad.addColorStop(0,'#e8c46a'); grad.addColorStop(1,'#8a5a22');
      ctx.beginPath(); ctx.fillStyle=grad; ctx.arc(f.x,f.y,r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.stroke();
    }
    for(const a of ants){
      ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.angle);
      ctx.fillStyle=a.state==='return'?'#d4863a':'#f2e9d8';
      ctx.beginPath(); ctx.ellipse(0,0,2.6,1.3,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.textAlign='left'; ctx.fillStyle="#efe6d3"; ctx.font="800 15px 'M PLUS Rounded 1c',sans-serif";
    ctx.fillText("はこんだ: "+delivered+"　のこり えさ: "+foods.reduce((s,f)=>s+f.amount,0),12,22);
  }

  function tick(){
    for(let s=0;s<speedMult;s++){ for(const a of ants) stepAnt(a); decayPheromones(); }
    draw();
    requestAnimationFrame(tick);
  }

  cv.addEventListener('click',(e)=>{
    const p=cvPos(e);
    if(moveNestMode){ nest.x=p.x; nest.y=p.y; }
    else{ foods.push({x:p.x,y:p.y,amount:120}); }
  });

  const antR=$("#antR");
  antR.addEventListener('input',()=>{
    const n=+antR.value;
    if(n>ants.length){ for(let i=ants.length;i<n;i++) ants.push(makeAnt()); }
    else{ ants.length=n; }
  });
  $("#spdR").addEventListener('input',(e)=>{ speedMult=+e.target.value; });

  const btnMoveNest=$("#btnMoveNest");
  btnMoveNest.onclick=()=>{ moveNestMode=!moveNestMode; btnMoveNest.classList.toggle('on',moveNestMode); };
  const btnPhero=$("#btnPhero");
  btnPhero.onclick=()=>{ showPhero=!showPhero; btnPhero.classList.toggle('on',showPhero); };
  $("#btnClearFood").onclick=()=>{ foods=[]; };
  $("#btnReset").onclick=()=>{
    homePhero.fill(0); foodPhero.fill(0); foods=[]; delivered=0;
    nest.x=W/2; nest.y=H*0.5;
    foods.push({x:W*0.18,y:H*0.22,amount:120});
    foods.push({x:W*0.82,y:H*0.75,amount:120});
    initAnts(+antR.value);
  };

  initAnts(+antR.value);
  foods.push({x:W*0.18,y:H*0.22,amount:120});
  foods.push({x:W*0.82,y:H*0.75,amount:120});
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
