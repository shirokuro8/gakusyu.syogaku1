<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>じゅうたいの ふしぎ｜ぶつりラボ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script>window.LAB_WHY={q:"じこも しんごうも ないのに、なぜ じゅうたいは できるのかな？"};</script>
<script src="_lab.js"></script>
<style>
  body{user-select:none;touch-action:none}
  html,body{height:100%;overflow:hidden}
  #app{height:100%;display:flex;flex-direction:column;gap:.5rem;padding:.6rem;overflow:hidden}
  .pagetitle{flex:0 0 auto;margin:0}
  .cv-wrap{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center}
  .cv-wrap canvas{max-width:100%;max-height:100%}
  .toolbar{flex:0 0 auto;margin-top:0}
  .sim-desc{flex:0 0 auto;margin-top:0}
  .sliderline{display:flex;align-items:center;gap:.5rem;background:var(--card);border-radius:99px;
    box-shadow:var(--shadow);padding:.5rem 1rem;font-weight:800;font-size:.85rem;flex:1;min-width:9.5rem}
  .sliderline input[type=range]{flex:1;accent-color:var(--theme)}
</style>
</head>
<body>
<div id="app">
  <div class="pagetitle">🚗 じゅうたいの ふしぎ</div>
  <div class="cv-wrap"><canvas id="gameCv" class="playcv"></canvas></div>
  <div class="toolbar">
    <label class="sliderline"><span>🚗 くるまの かず</span><input type="range" class="focusable" id="nR" min="8" max="70" step="1" value="34"></label>
    <label class="sliderline"><span>💨 はやさ</span><input type="range" class="focusable" id="v0R" min="10" max="40" step="1" value="26"></label>
  </div>
  <div class="toolbar">
    <button class="focusable on" id="btnPlay">⏸️ いちじていし</button>
    <button class="focusable" id="btnReset">🔄 やりなおす</button>
    <button class="focusable" id="btnBrake">🚨 きゅうブレーキ</button>
  </div>
  <div class="sim-desc">みちは わっかに なっているよ。しんごうも じこも ないのに、くるまは まえの くるまに ぶつからないよう、じぶんで スピードを かえながら はしっているよ。「🚗くるまの かず」を ふやすと、だれも わるくないのに『じゅうたい』が しぜんに うまれるよ。したの ほそながい えは じかんの きろく（よこ＝じかん、たて＝みちの ばしょ）。あかい なみが『じゅうたい』で、くるまの すすむ むきと ぎゃくむきに なみが つたわっていくよ。「🚨きゅうブレーキ」で 1だいだけ とめると、なみが うまれる しゅんかんが みえるよ。</div>
</div>
<script>
(function(){
  const $=s=>document.querySelector(s);
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

  const cv=$("#gameCv");const W=720,H=560;cv.width=W;cv.height=H;
  function fitCanvas(){
    const box=cv.parentElement.getBoundingClientRect();
    const scale=Math.min(box.width/W, box.height/H);
    cv.style.width=(W*scale)+"px"; cv.style.height=(H*scale)+"px";
  }
  window.addEventListener("resize",fitCanvas); fitCanvas();
  const ctx=cv.getContext("2d");

  /* ===== わっか みち の うえを はしる IDM(Intelligent Driver Model) しゃりょうぐん ===== */
  const RCX=360,RCY=228,ROAD_R=158;
  const ROAD_LEN=2*Math.PI*ROAD_R;
  const A_MAX=1.5,B_COMF=2.0,T_HW=1.4,CAR_LEN=5.5,S0=12;

  let cars=[],running=true;
  const nR=$("#nR"),v0R=$("#v0R");
  let n=+nR.value,v0=+v0R.value;

  function initCars(){
    cars=[];
    for(let i=0;i<n;i++) cars.push({pos:(i/n)*ROAD_LEN, v:v0*0.8});
  }

  function idmAccel(car,gapDist,leadV){
    const sStar=S0+Math.max(0, car.v*T_HW + (car.v*(car.v-leadV))/(2*Math.sqrt(A_MAX*B_COMF)));
    const gap=Math.max(gapDist-CAR_LEN,0.1);
    return A_MAX*(1-Math.pow(car.v/v0,4)-Math.pow(sStar/gap,2));
  }

  function step(dt){
    cars.sort((a,b)=>a.pos-b.pos);
    const cn=cars.length,acc=new Array(cn);
    for(let i=0;i<cn;i++){
      const car=cars[i],lead=cars[(i+1)%cn];
      let gap=lead.pos-car.pos; if(gap<0)gap+=ROAD_LEN;
      acc[i]=idmAccel(car,gap,lead.v);
    }
    for(let i=0;i<cn;i++){
      cars[i].v=Math.max(0,cars[i].v+acc[i]*dt);
      cars[i].pos=(cars[i].pos+cars[i].v*dt)%ROAD_LEN;
      if(cars[i].pos<0)cars[i].pos+=ROAD_LEN;
    }
  }

  function speedColor(v){
    const t=clamp(v/v0,0,1);
    const r=Math.round(255*(1-t)+40*t), g=Math.round(60*(1-t)+215*t), b=Math.round(60*(1-t)+110*t);
    return `rgb(${r},${g},${b})`;
  }

  /* ── したの じかん・ばしょ の きろく（オフスクリーンに かきため、よこに ずらす） ── */
  const stX=30,stY=430,stW=W-60,stH=110;
  const stBuf=document.createElement("canvas"); stBuf.width=stW; stBuf.height=stH;
  const sbx=stBuf.getContext("2d");
  sbx.fillStyle="#080b16"; sbx.fillRect(0,0,stW,stH);

  function drawSpaceTime(){
    sbx.drawImage(stBuf,-1,0);
    sbx.fillStyle="#080b16"; sbx.fillRect(stW-1,0,1,stH);
    for(const c of cars){
      const y=(c.pos/ROAD_LEN)*stH;
      sbx.fillStyle=speedColor(c.v);
      sbx.fillRect(stW-1,y,1,2);
    }
  }

  function drawRing(){
    ctx.strokeStyle="#26332d"; ctx.lineWidth=26;
    ctx.beginPath(); ctx.arc(RCX,RCY,ROAD_R,0,7); ctx.stroke();
    ctx.strokeStyle="#3a4a42"; ctx.setLineDash([6,10]); ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(RCX,RCY,ROAD_R,0,7); ctx.stroke(); ctx.setLineDash([]);
    for(const c of cars){
      const ang=(c.pos/ROAD_LEN)*2*Math.PI-Math.PI/2;
      const x=RCX+ROAD_R*Math.cos(ang), y=RCY+ROAD_R*Math.sin(ang);
      ctx.beginPath(); ctx.fillStyle=speedColor(c.v); ctx.arc(x,y,6.5,0,7); ctx.fill();
    }
  }

  function render(){
    ctx.fillStyle="#0b0f1c"; ctx.fillRect(0,0,W,H);
    drawRing();
    ctx.drawImage(stBuf,stX,stY);
    ctx.strokeStyle="#ffffff22"; ctx.lineWidth=1; ctx.strokeRect(stX,stY,stW,stH);

    const avgV=cars.reduce((a,c)=>a+c.v,0)/cars.length;
    const minV=Math.min(...cars.map(c=>c.v));
    ctx.textAlign="left"; ctx.fillStyle="#cfe0ff";
    ctx.font="800 16px 'M PLUS Rounded 1c',sans-serif";
    ctx.fillText("くるま: "+cars.length+" だい　へいきん: "+avgV.toFixed(0),14,26);

    const jammed=minV<v0*0.3;
    ctx.font="800 15px 'M PLUS Rounded 1c',sans-serif";
    ctx.fillStyle=jammed?"#ff6b6b":"#5be08a";
    ctx.textAlign="right";
    ctx.fillText(jammed?"🚦 じゅうたい ちゅう":"🟢 スムーズ",W-14,26);
    ctx.textAlign="left";
  }

  let last=performance.now();
  function frame(now){
    const dt=Math.min(0.033,(now-last)/1000); last=now;
    if(running){
      step(dt*2.4); step(dt*2.4);
      drawSpaceTime();
    }
    render();
    requestAnimationFrame(frame);
  }

  nR.addEventListener("input",()=>{ n=+nR.value; initCars(); });
  v0R.addEventListener("input",()=>{ v0=+v0R.value; });

  const btnPlay=$("#btnPlay");
  btnPlay.onclick=()=>{
    running=!running;
    btnPlay.textContent=running?"⏸️ いちじていし":"▶️ さいかい";
    btnPlay.classList.toggle("on",running);
  };
  $("#btnReset").onclick=()=>{
    initCars();
    sbx.fillStyle="#080b16"; sbx.fillRect(0,0,stW,stH);
  };
  $("#btnBrake").onclick=()=>{
    if(cars.length) cars[Math.floor(Math.random()*cars.length)].v*=0.12;
  };

  initCars();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
