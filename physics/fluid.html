<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>りゅうたい シミュレーション｜ぶつりラボ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  body{user-select:none;touch-action:none}
  html,body{height:100%;overflow:hidden}
  #app{height:100%;display:flex;flex-direction:column;gap:.5rem;padding:.6rem;overflow:hidden}
  .pagetitle{flex:0 0 auto;margin:0}
  .cv-wrap{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center}
  .cv-wrap canvas{max-width:100%;max-height:100%}
  .toolbar{flex:0 0 auto;margin-top:0}
  .sim-desc{flex:0 0 auto;margin-top:0}
  .sliderline{display:flex;align-items:center;gap:.5rem;background:var(--card);border-radius:99px;
    box-shadow:var(--shadow);padding:.5rem 1rem;font-weight:800;font-size:.85rem;flex:1;min-width:9.5rem}
  .sliderline input[type=range]{flex:1;accent-color:var(--theme)}
</style>
</head>
<body>
<div id="app">
  <div class="pagetitle">🌊 りゅうたい シミュレーション</div>
  <div class="cv-wrap"><canvas id="gameCv" class="playcv"></canvas></div>
  <div class="toolbar">
    <label class="sliderline"><span>💨 かぜ</span><input type="range" class="focusable" id="windR" min="1" max="6" step="0.5" value="3.5"></label>
    <label class="sliderline"><span>⚪ おおきさ</span><input type="range" class="focusable" id="sizeR" min="0" max="46" step="1" value="30"></label>
  </div>
  <div class="toolbar">
    <button class="focusable" id="btnClear">🧹 きれいに</button>
    <button class="focusable" id="btnBurst">💥 ばくはつ</button>
  </div>
  <div class="sim-desc">ひだりから みぎへ、かぜが ずっと ふいているよ。がめんを ゆびで タップ・ドラッグすると「まる いし」を おける！ おいた ばしょで ながれが まがったり、うずを まいたり するのを かんさつしよう。「⚪おおきさ」で いしの おおきさ、「💨かぜ」で つよさを かえられるよ。</div>
</div>
<script>
(function(){
  const $=s=>document.querySelector(s);
  function cvPos(cv,e){const r=cv.getBoundingClientRect();
    return {x:(e.clientX-r.left)*(cv.width/r.width), y:(e.clientY-r.top)*(cv.height/r.height)};}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  /* 補助: HSL→RGB（0-1入力→0-255配列） */
  function hsl2rgb(h,s,l){h/=360;const f=(n)=>{const k=(n+h*12)%12;const a=s*Math.min(l,1-l);
    return l-a*Math.max(-1,Math.min(k-3,9-k,1));};
    return [Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];}

  const cv=$("#gameCv");const W=720,H=560;cv.width=W;cv.height=H;
  function fitCanvas(){
    const box=cv.parentElement.getBoundingClientRect();
    const scale=Math.min(box.width/W, box.height/H);
    cv.style.width=(W*scale)+"px"; cv.style.height=(H*scale)+"px";
  }
  window.addEventListener("resize",fitCanvas); fitCanvas();
  const ctx=cv.getContext("2d");ctx.imageSmoothingEnabled=true;

  /* ===== 安定化された流体ソルバー（Navier–Stokes / Jos Stam 方式）を「風洞」として使う ===== */
  const N=56,size=(N+2)*(N+2),IX=(i,j)=>i+(N+2)*j;
  const cellW=W/N,cellH=H/N;
  const u=new Float32Array(size),v=new Float32Array(size),u0=new Float32Array(size),v0=new Float32Array(size);
  const dR=new Float32Array(size),dG=new Float32Array(size),dB=new Float32Array(size);
  const dR0=new Float32Array(size),dG0=new Float32Array(size),dB0=new Float32Array(size);
  const solid=new Uint8Array(size);
  const off=document.createElement("canvas");off.width=N+2;off.height=N+2;
  const octx=off.getContext("2d");const img=octx.createImageData(N+2,N+2);
  const dt=0.14;
  const WIND_SCALE=0.08;                 // スライダー値(1-6)を、この解像度の格子で自然に見える流速に変換する
  let windSpeed=3.5*WIND_SCALE,obRpx=30,obPx=W*0.4,obPy=H*0.5,obstacleOn=true,dragOb=false,tick=0;

  function set_bnd(b,x){for(let i=1;i<=N;i++){
      if(b===1){x[IX(0,i)]=windSpeed;x[IX(N+1,i)]=x[IX(N,i)];}
      else{x[IX(0,i)]=x[IX(1,i)];x[IX(N+1,i)]=x[IX(N,i)];}
      x[IX(i,0)]=b===2?-x[IX(i,1)]:x[IX(i,1)];x[IX(i,N+1)]=b===2?-x[IX(i,N)]:x[IX(i,N)];}}
  function lin(b,x,x0,a,c,it){const ci=1/c;for(let k=0;k<it;k++){
      for(let j=1;j<=N;j++)for(let i=1;i<=N;i++)
        x[IX(i,j)]=(x0[IX(i,j)]+a*(x[IX(i-1,j)]+x[IX(i+1,j)]+x[IX(i,j-1)]+x[IX(i,j+1)]))*ci;
      set_bnd(b,x);}}
  function diffuse(b,x,x0,df,it){const a=dt*df*N*N;lin(b,x,x0,a,1+4*a,it);}
  function advect(b,dd,dd0,uu,vv){const dt0=dt*N;
    for(let j=1;j<=N;j++)for(let i=1;i<=N;i++){
      let x=i-dt0*uu[IX(i,j)],y=j-dt0*vv[IX(i,j)];
      if(x<.5)x=.5;if(x>N+.5)x=N+.5;const i0=x|0,i1=i0+1;
      if(y<.5)y=.5;if(y>N+.5)y=N+.5;const j0=y|0,j1=j0+1;
      const s1=x-i0,s0=1-s1,t1=y-j0,t0=1-t1;
      dd[IX(i,j)]=s0*(t0*dd0[IX(i0,j0)]+t1*dd0[IX(i0,j1)])+s1*(t0*dd0[IX(i1,j0)]+t1*dd0[IX(i1,j1)]);}
    set_bnd(b,dd);}
  function project(uu,vv,p,dv){
    for(let j=1;j<=N;j++)for(let i=1;i<=N;i++){
      dv[IX(i,j)]=-0.5*(uu[IX(i+1,j)]-uu[IX(i-1,j)]+vv[IX(i,j+1)]-vv[IX(i,j-1)])/N;p[IX(i,j)]=0;}
    set_bnd(0,dv);set_bnd(0,p);lin(0,p,dv,1,4,18);
    for(let j=1;j<=N;j++)for(let i=1;i<=N;i++){
      uu[IX(i,j)]-=0.5*N*(p[IX(i+1,j)]-p[IX(i-1,j)]);vv[IX(i,j)]-=0.5*N*(p[IX(i,j+1)]-p[IX(i,j-1)]);}
    set_bnd(1,uu);set_bnd(2,vv);}

  /* ── しょうがいぶつ（円）: 感知するのではなく、その内側の速度・色を毎フレーム0に固定することで
     まわりの流れが「よけて」流れる（湧き出し・吸い込みのない壁として作用） ── */
  function rebuildSolid(){
    solid.fill(0);
    if(obRpx<=2){obstacleOn=false;return;}
    obstacleOn=true;const r2=obRpx*obRpx;
    for(let j=1;j<=N;j++){const py=(j-0.5)*cellH;
      for(let i=1;i<=N;i++){const px=(i-0.5)*cellW;
        const dx=px-obPx,dy=py-obPy;if(dx*dx+dy*dy<=r2)solid[IX(i,j)]=1;}}
  }
  function enforceSolid(){for(let k=0;k<size;k++){if(solid[k]){u[k]=0;v[k]=0;dR[k]=0;dG[k]=0;dB[k]=0;}}}

  /* ── 左端から すこしずつ 虹色の すじ（ストリークライン）を ながしこむ ── */
  const stripeHues=[355,25,55,95,140,175,205,250,290];
  function injectStreaks(){
    for(let s=0;s<stripeHues.length;s++){
      const j=Math.round(1+(s+0.5)/stripeHues.length*N);
      if(j<1||j>N||solid[IX(2,j)])continue;
      const[r,g,b]=hsl2rgb(stripeHues[s],0.85,0.55);
      const amt=0.55,rn=r/255,gn=g/255,bn=b/255;
      dR[IX(2,j)]+=amt*rn;dG[IX(2,j)]+=amt*gn;dB[IX(2,j)]+=amt*bn;
      dR[IX(3,j)]+=amt*rn*0.7;dG[IX(3,j)]+=amt*gn*0.7;dB[IX(3,j)]+=amt*bn*0.7;
    }
  }
  /* ── 左端から一定の風速で押し出す（ファン）。すこしゆらぎを加えて うずが 生まれやすくする ── */
  function applyInflow(){
    for(let j=1;j<=N;j++){
      if(solid[IX(1,j)])continue;
      u[IX(1,j)]=windSpeed;
      v[IX(1,j)]=(v[IX(1,j)]+Math.sin(tick*0.06+j*0.4)*windSpeed*0.3)*0.9;
    }
  }
  function burst(){
    const bx=1+Math.floor(Math.random()*N),by=1+Math.floor(Math.random()*N);
    for(let a=0;a<12;a++){const an=a/12*Math.PI*2;
      const ii=bx+Math.round(Math.cos(an)*2),jj=by+Math.round(Math.sin(an)*2);
      if(ii<1||ii>N||jj<1||jj>N)continue;
      u[IX(ii,jj)]+=Math.cos(an)*1.1;v[IX(ii,jj)]+=Math.sin(an)*1.1;
      dR[IX(ii,jj)]+=0.6;dG[IX(ii,jj)]+=0.6;dB[IX(ii,jj)]+=0.6;}
  }

  cv.addEventListener("pointerdown",e=>{cv.setPointerCapture(e.pointerId);dragOb=true;
    const p=cvPos(cv,e);obPx=clamp(p.x,36,W-36);obPy=clamp(p.y,36,H-36);});
  cv.addEventListener("pointermove",e=>{if(!dragOb)return;e.preventDefault();
    const p=cvPos(cv,e);obPx=clamp(p.x,36,W-36);obPy=clamp(p.y,36,H-36);});
  cv.addEventListener("pointerup",()=>dragOb=false);
  cv.addEventListener("pointercancel",()=>dragOb=false);
  $("#windR").oninput=e=>{windSpeed=(+e.target.value)*WIND_SCALE;};
  $("#sizeR").oninput=e=>{obRpx=+e.target.value;};
  $("#btnClear").onclick=()=>{dR.fill(0);dG.fill(0);dB.fill(0);u.fill(0);v.fill(0);};
  $("#btnBurst").onclick=burst;

  function frame(){
    tick++;
    rebuildSolid();
    injectStreaks();
    applyInflow();
    enforceSolid();
    diffuse(1,u0,u,0.00002,4);diffuse(2,v0,v,0.00002,4);project(u0,v0,u,v);
    advect(1,u,u0,u0,v0);advect(2,v,v0,u0,v0);project(u,v,u0,v0);
    enforceSolid();
    diffuse(0,dR0,dR,0.00001,4);advect(0,dR,dR0,u,v);
    diffuse(0,dG0,dG,0.00001,4);advect(0,dG,dG0,u,v);
    diffuse(0,dB0,dB,0.00001,4);advect(0,dB,dB0,u,v);
    enforceSolid();
    const decay=0.992;
    for(let k=0;k<size;k++){dR[k]*=decay;dG[k]*=decay;dB[k]*=decay;}

    const px=img.data,SAT=1.35;
    for(let j=0;j<N+2;j++)for(let i=0;i<N+2;i++){
      const o=(j*(N+2)+i)*4;
      const nr=Math.min(1,dR[IX(i,j)]/SAT),ng=Math.min(1,dG[IX(i,j)]/SAT),nb=Math.min(1,dB[IX(i,j)]/SAT);
      const inten=Math.max(nr,ng,nb);
      if(inten<0.02){px[o+3]=0;continue;}
      px[o]=Math.round(nr*255);px[o+1]=Math.round(ng*255);px[o+2]=Math.round(nb*255);
      px[o+3]=Math.min(255,inten*255*2.2);}
    octx.putImageData(img,0,0);
    ctx.fillStyle="#0a1230";ctx.fillRect(0,0,W,H);
    ctx.drawImage(off,1,1,N,N,0,0,W,H);

    if(obstacleOn){
      const grd=ctx.createRadialGradient(obPx-obRpx*0.3,obPy-obRpx*0.35,obRpx*0.15,obPx,obPy,obRpx);
      grd.addColorStop(0,"#f3f7ff");grd.addColorStop(.7,"#b7c5de");grd.addColorStop(1,"#75839c");
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(obPx,obPy,obRpx,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="#ffffffaa";ctx.lineWidth=2;ctx.stroke();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
