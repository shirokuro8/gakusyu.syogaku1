<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>1000にんの こうさてん｜ぶつりラボ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  body{user-select:none;touch-action:none}
  html,body{height:100%;overflow:hidden}
  #app{height:100%;display:flex;flex-direction:column;gap:.5rem;padding:.6rem;overflow:hidden}
  .pagetitle{flex:0 0 auto;margin:0}
  .cv-wrap{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center}
  .cv-wrap canvas{max-width:100%;max-height:100%}
  .toolbar{flex:0 0 auto;margin-top:0}
  .sim-desc{flex:0 0 auto;margin-top:0}
</style>
</head>
<body>
<div id="app">
  <div class="pagetitle">🚶 1000にんの こうさてん</div>
  <div class="cv-wrap"><canvas id="gameCv" class="playcv"></canvas></div>
  <div class="toolbar">
    <button class="focusable on" id="btnSense">👁️ かんちはんい：ON</button>
    <button class="focusable" id="btnReset">🔄 やりなおす</button>
  </div>
  <div class="sim-desc">かんとうとう（まんなかで しじする ひと）は いないよ！ 1000にんが それぞれ すぐ近くの「ごきんじょ」だけを見て、ぶつからないように 自分で よけながら すすんでいるよ。まんなかの いしを ドラッグして うごかすと、みんなが 自然に みちを かえる ようすが 見られるよ。「👁️」ボタンで、1人が どこまで 見えているか（かんちはんい）を たしかめよう。</div>
</div>
<script>
(function(){
  const $=s=>document.querySelector(s);
  function cvPos(cv,e){const r=cv.getBoundingClientRect();
    return {x:(e.clientX-r.left)*(cv.width/r.width), y:(e.clientY-r.top)*(cv.height/r.height)};}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

  const cv=$("#gameCv");const W=720,H=560;cv.width=W;cv.height=H;
  function fitCanvas(){
    const box=cv.parentElement.getBoundingClientRect();
    const scale=Math.min(box.width/W, box.height/H);
    cv.style.width=(W*scale)+"px"; cv.style.height=(H*scale)+"px";
  }
  window.addEventListener("resize",fitCanvas); fitCanvas();
  const ctx=cv.getContext("2d");

  /* ===== 完全分散制御の群衆シミュレーション（中央管制なし・近傍センサーのみ） ===== */
  const PER_GROUP=250;                 // 4方向 x 250人 = 1000人
  const SENS=24;                       // 感知半径（px）── これが「ご近所」の範囲
  const MAXSPD=92;                     // 目標いどう速さ(px/s)
  const STEER_K=3.0;                   // 目標方向へ向きなおす速さ
  const SEP_ACC=5200;                  // ひと同士の反発の強さ
  const OBS_ACC=9500;                  // 障害物の反発の強さ
  const GROUPS=[
    {edge:"left",  color:"#57d6ff"},
    {edge:"right", color:"#ff6bc1"},
    {edge:"top",   color:"#ffd23d"},
    {edge:"bottom",color:"#7be07f"},
  ];
  let obX=W/2,obY=H/2,obR=42,dragOb=false;
  let agents=[],arrived=0,showSense=true;

  function spawnPos(edge){
    const j=18+Math.random()*(H-36),k=18+Math.random()*(W-36);
    if(edge==="left")  return{x:-20-Math.random()*40,y:j};
    if(edge==="right") return{x:W+20+Math.random()*40,y:j};
    if(edge==="top")   return{x:k,y:-20-Math.random()*40};
    return{x:k,y:H+20+Math.random()*40};
  }
  function goalFor(edge,px,py){
    if(edge==="left")  return{x:W+40,y:py};
    if(edge==="right") return{x:-40,y:py};
    if(edge==="top")   return{x:px,y:H+40};
    return{x:px,y:-40};
  }
  function makeAgent(gi){
    const g=GROUPS[gi],p=spawnPos(g.edge);
    return{x:p.x,y:p.y,vx:0,vy:0,gi,goal:goalFor(g.edge,p.x,p.y)};
  }
  function respawn(a){
    const g=GROUPS[a.gi],p=spawnPos(g.edge);
    a.x=p.x;a.y=p.y;a.vx=0;a.vy=0;a.goal=goalFor(g.edge,p.x,p.y);
  }
  function resetAll(){
    agents=[];
    for(let gi=0;gi<GROUPS.length;gi++)for(let k=0;k<PER_GROUP;k++)agents.push(makeAgent(gi));
    arrived=0;
  }

  /* ── 空間ハッシュ：各エージェントは自分のまわり(3x3セル)しか見ない＝中央管制なしの近傍探索 ── */
  function buildGrid(){
    const grid=new Map();
    for(let idx=0;idx<agents.length;idx++){
      const a=agents[idx];
      const key=((a.x/SENS)|0)+","+((a.y/SENS)|0);
      let arr=grid.get(key);if(!arr){arr=[];grid.set(key,arr);}arr.push(idx);
    }
    return grid;
  }
  function step(dt){
    const grid=buildGrid();
    for(let idx=0;idx<agents.length;idx++){
      const a=agents[idx];
      const gx=a.goal.x-a.x,gy=a.goal.y-a.y,gd=Math.hypot(gx,gy)||1;
      let fx=((gx/gd)*MAXSPD-a.vx)*STEER_K, fy=((gy/gd)*MAXSPD-a.vy)*STEER_K;
      const cx=(a.x/SENS)|0,cy=(a.y/SENS)|0;
      for(let ddy=-1;ddy<=1;ddy++)for(let ddx=-1;ddx<=1;ddx++){
        const arr=grid.get((cx+ddx)+","+(cy+ddy));if(!arr)continue;
        for(let m=0;m<arr.length;m++){
          const j=arr[m];if(j===idx)continue;
          const b=agents[j],dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;
          if(d2<SENS*SENS&&d2>0.0001){
            const d=Math.sqrt(d2),push=(SENS-d)/SENS,w=push*push*SEP_ACC;
            fx+=(dx/d)*w;fy+=(dy/d)*w;
          }
        }
      }
      const ox=a.x-obX,oy=a.y-obY,od=Math.hypot(ox,oy)||1,rr=obR+9;
      if(od<rr){const w=(rr-od)/rr*OBS_ACC;fx+=(ox/od)*w;fy+=(oy/od)*w;}
      a.vx=(a.vx+fx*dt)*0.985;a.vy=(a.vy+fy*dt)*0.985;
      const sp=Math.hypot(a.vx,a.vy),cap=MAXSPD*1.5;
      if(sp>cap){a.vx=a.vx/sp*cap;a.vy=a.vy/sp*cap;}
      a.x+=a.vx*dt;a.y+=a.vy*dt;
      if(gd<12){arrived++;respawn(a);}
    }
  }

  cv.addEventListener("pointerdown",e=>{cv.setPointerCapture(e.pointerId);dragOb=true;
    const p=cvPos(cv,e);obX=clamp(p.x,30,W-30);obY=clamp(p.y,30,H-30);});
  cv.addEventListener("pointermove",e=>{if(!dragOb)return;e.preventDefault();
    const p=cvPos(cv,e);obX=clamp(p.x,30,W-30);obY=clamp(p.y,30,H-30);});
  cv.addEventListener("pointerup",()=>dragOb=false);
  cv.addEventListener("pointercancel",()=>dragOb=false);
  const bs=$("#btnSense");bs.onclick=()=>{showSense=!showSense;
    bs.textContent="👁️ かんちはんい："+(showSense?"ON":"OFF");bs.classList.toggle("on",showSense);};
  $("#btnReset").onclick=resetAll;

  function render(){
    ctx.fillStyle="rgba(13,27,61,0.38)";ctx.fillRect(0,0,W,H);
    if(showSense&&agents.length){
      let best=agents[0],bd=1e9;
      for(const a of agents){const d=(a.x-obX)*(a.x-obX)+(a.y-obY)*(a.y-obY);if(d<bd){bd=d;best=a;}}
      ctx.beginPath();ctx.arc(best.x,best.y,SENS,0,7);
      ctx.fillStyle="#ffffff22";ctx.fill();ctx.strokeStyle="#ffffffaa";ctx.lineWidth=1.5;ctx.stroke();
    }
    for(const a of agents){ctx.fillStyle=GROUPS[a.gi].color;ctx.fillRect(a.x-1.7,a.y-1.7,3.4,3.4);}
    const grd=ctx.createRadialGradient(obX-obR*0.3,obY-obR*0.3,obR*0.1,obX,obY,obR);
    grd.addColorStop(0,"#f6e9c8");grd.addColorStop(.7,"#caa968");grd.addColorStop(1,"#8a6b3d");
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(obX,obY,obR,0,7);ctx.fill();
    ctx.strokeStyle="#ffffffaa";ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle="#cfe0ff";ctx.font="800 16px 'M PLUS Rounded 1c',sans-serif";ctx.textAlign="left";
    ctx.fillText("とうちゃく: "+arrived+"にん　／　にんずう: "+agents.length,14,26);
  }
  resetAll();
  let last=performance.now();
  function frame(now){
    const dt=Math.min(0.033,(now-last)/1000);last=now;
    step(dt);render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
