<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>きの そだちかた｜ぶつりラボ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script>window.LAB_WHY={q:"おなじ ルールを なんかいも くりかえすと、なぜ き の かたちに なるのかな？"};</script>
<script src="_lab.js"></script>
<style>
  body{user-select:none;touch-action:none}
  html,body{height:100%;overflow:hidden}
  #app{height:100%;display:flex;flex-direction:column;gap:.5rem;padding:.6rem;overflow:hidden}
  .pagetitle{flex:0 0 auto;margin:0}
  .cv-wrap{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center}
  .cv-wrap canvas{max-width:100%;max-height:100%;border-radius:var(--r);box-shadow:var(--shadow)}
  .toolbar{flex:0 0 auto;margin-top:0}
  .sim-desc{flex:0 0 auto;margin-top:0}
  .sliderline{display:flex;align-items:center;gap:.5rem;background:var(--card);border-radius:99px;
    box-shadow:var(--shadow);padding:.5rem 1rem;font-weight:800;font-size:.85rem;flex:1;min-width:9.5rem}
  .sliderline input[type=range]{flex:1;accent-color:var(--theme)}
</style>
</head>
<body>
<div id="app">
  <div class="pagetitle">🌿 きの そだちかた</div>
  <div class="cv-wrap"><canvas id="view" class="playcv"></canvas></div>
  <div class="toolbar">
    <button class="focusable on" id="p0">🌳 き</button>
    <button class="focusable" id="p1">🌿 シダ</button>
    <button class="focusable" id="p2">🌾 くさばな</button>
    <button class="focusable" id="p3">🍂 やぶ</button>
  </div>
  <div class="toolbar">
    <label class="sliderline"><span>🌱 せいちょうだんかい</span><input type="range" class="focusable" id="iterR" min="2" max="5" step="1" value="4"></label>
    <button class="focusable" id="btnGrow">🌱 そだてる</button>
    <button class="focusable" id="btnReset">🔄 リセット</button>
  </div>
  <div class="sim-desc">1本の くき から スタートして、「F・+・-・[・]」という 4しゅるいの きごう を なんかいも くりかえし おきかえる ルール(Lシステム)で、木 や シダ の かたち を つくって いるよ。「F」は くき を のばす、「+」「-」は みぎ や ひだり に まがる、「[」「]」は えだ を わけて また もどる の いみだよ。おなじ かんたんな ルール を くりかえす だけ で、ほんもの みたいな ふくざつな しぜん の かたち が うまれるのが おもしろいね。「せいちょうだんかい」を あげると、もっと こまかく えだわかれ するよ。</div>
</div>
<script>
(function(){
  const $=s=>document.querySelector(s);
  const view=$("#view"), ctx=view.getContext("2d");
  const W=340,H=440; view.width=W; view.height=H;
  function fitCanvas(){
    const box=view.parentElement.getBoundingClientRect();
    const scale=Math.min(box.width/W, box.height/H);
    view.style.width=(W*scale)+"px"; view.style.height=(H*scale)+"px";
  }
  window.addEventListener("resize",fitCanvas); fitCanvas();

  const PRESETS=[
    {axiom:"F", rules:{F:"FF+[+F-F-F]-[-F+F+F]"}, angle:22.5, trunk:"#7a5232", leaf:"#4aa34a", flower:true},
    {axiom:"X", rules:{X:"F+[[X]-X]-F[-FX]+X", F:"FF"}, angle:25, trunk:"#5a8a3a", leaf:"#3f9e57", flower:false},
    {axiom:"F", rules:{F:"F[+F]F[-F]F"}, angle:25.7, trunk:"#6b8c3f", leaf:"#5fae4a", flower:false},
    {axiom:"F", rules:{F:"F[+F][-F]F"}, angle:20, trunk:"#8a6a3a", leaf:"#c98a3a", flower:false},
  ];
  const FLOWER_COL=["#ff6b8a","#ffd166","#ff8fab","#fff275","#ff9f6b"];
  let curPreset=0, segs=[], maxDepth=1, revealCount=0, perFrame=1;

  const iterR=$("#iterR"), btnGrow=$("#btnGrow");
  const pbtns=[$("#p0"),$("#p1"),$("#p2"),$("#p3")];
  pbtns.forEach((b,i)=>b.addEventListener("click",()=>{
    pbtns.forEach(x=>x.classList.remove("on")); b.classList.add("on");
    curPreset=i; generate();
  }));
  iterR.addEventListener("change",generate);
  btnGrow.addEventListener("click",generate);
  $("#btnReset").addEventListener("click",()=>{       // さいしょの「き」に もどす
    pbtns.forEach(x=>x.classList.remove("on")); pbtns[0].classList.add("on");
    curPreset=0; iterR.value=4; generate();
  });

  function expand(preset,iter){
    let s=preset.axiom;
    for(let i=0;i<iter;i++){
      let out="";
      for(const c of s) out += (preset.rules[c]!==undefined ? preset.rules[c] : c);
      s=out;
      if(s.length>150000){ break; }
    }
    return s;
  }

  function build(){
    const preset=PRESETS[curPreset];
    const iter=+iterR.value;
    const str=expand(preset,iter);
    const angStep=preset.angle*Math.PI/180;
    const baseLen=11;
    let x=0,y=0,ang=0,depth=0;
    const stack=[];
    const list=[];
    let md=0;
    for(let idx=0;idx<str.length;idx++){
      const c=str[idx];
      if(c==="F"){
        const len=baseLen*Math.pow(0.80,depth);
        const nx=x+Math.sin(ang)*len, ny=y-Math.cos(ang)*len;
        const nextC=str[idx+1];
        const isTip=(nextC===undefined||nextC==="]");
        list.push({x1:x,y1:y,x2:nx,y2:ny,depth,isTip});
        x=nx; y=ny; if(depth>md) md=depth;
      }else if(c==="+"){ ang += angStep*(0.9+Math.random()*0.2); }
      else if(c==="-"){ ang -= angStep*(0.9+Math.random()*0.2); }
      else if(c==="["){ stack.push({x,y,ang,depth}); depth++; }
      else if(c==="]"){ const st=stack.pop(); if(st){x=st.x;y=st.y;ang=st.ang;depth=st.depth;} }
    }
    return {list,md};
  }

  function generate(){
    const {list,md}=build();
    let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
    for(const s of list){
      minX=Math.min(minX,s.x1,s.x2); maxX=Math.max(maxX,s.x1,s.x2);
      minY=Math.min(minY,s.y1,s.y2); maxY=Math.max(maxY,s.y1,s.y2);
    }
    if(list.length===0){minX=0;maxX=1;minY=0;maxY=1;}
    const mw=Math.max(1,maxX-minX), mh=Math.max(1,maxY-minY);
    const pad=30;
    const scale=Math.min((W-pad*2)/mw,(H-pad*2)/mh);
    const offX=W/2 - (minX+maxX)/2*scale;
    const offY=H-pad - maxY*scale;
    segs = list.map(s=>({
      x1:s.x1*scale+offX, y1:s.y1*scale+offY,
      x2:s.x2*scale+offX, y2:s.y2*scale+offY,
      depth:s.depth, isTip:s.isTip
    }));
    maxDepth=Math.max(1,md);
    revealCount=0;
    perFrame=Math.max(1,Math.ceil(segs.length/90));
    ctx.fillStyle="#eef6ea"; ctx.fillRect(0,0,W,H);
  }

  function lerpCol(c0,c1,t){
    const p=(h)=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    const a=p(c0),b=p(c1);
    return `rgb(${a[0]+(b[0]-a[0])*t|0},${a[1]+(b[1]-a[1])*t|0},${a[2]+(b[2]-a[2])*t|0})`;
  }

  function frame(){
    const preset=PRESETS[curPreset];
    if(revealCount<segs.length){
      const end=Math.min(segs.length,revealCount+perFrame);
      for(let i=revealCount;i<end;i++){
        const s=segs[i];
        const t=Math.min(1,s.depth/maxDepth);
        ctx.strokeStyle=lerpCol(preset.trunk,preset.leaf,t);
        ctx.lineWidth=Math.max(1,5*Math.pow(0.78,s.depth));
        ctx.lineCap="round";
        ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke();
        if(s.isTip){
          ctx.fillStyle = preset.flower ? FLOWER_COL[(i*7)%FLOWER_COL.length] : preset.leaf;
          ctx.beginPath(); ctx.arc(s.x2,s.y2,preset.flower?3.4:2.4,0,Math.PI*2); ctx.fill();
        }
      }
      revealCount=end;
    }
    requestAnimationFrame(frame);
  }

  generate();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
