<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>げんの しんどうと おと｜ぶつりラボ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  body{user-select:none;touch-action:none}
  html,body{height:100%;overflow:hidden}
  #app{height:100%;display:flex;flex-direction:column;gap:.5rem;padding:.6rem;overflow:hidden}
  .pagetitle{flex:0 0 auto;margin:0}
  .cv-wrap{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center}
  .cv-wrap canvas{max-width:100%;max-height:100%}
  .toolbar{flex:0 0 auto;margin-top:0}
  .sim-desc{flex:0 0 auto;margin-top:0}
  .sliderline{display:flex;align-items:center;gap:.6rem;background:var(--card);border-radius:99px;
    box-shadow:var(--shadow);padding:.5rem 1rem;font-weight:800;font-size:.85rem;flex:1;min-width:14rem}
  .sliderline input[type=range]{flex:1;accent-color:var(--theme)}
</style>
</head>
<body>
<div id="app">
  <div class="pagetitle">🎻 げんの しんどうと おと</div>
  <div class="cv-wrap"><canvas id="gameCv" class="playcv"></canvas></div>
  <div class="toolbar">
    <label class="sliderline"><span>🔺みじかい・たかい</span>
      <input type="range" class="focusable" id="lenR" min="0.55" max="1.6" step="0.01" value="1">
      <span>ながい・ひくい🔻</span></label>
  </div>
  <div class="toolbar">
    <button class="focusable" id="btnScale">🔀 スケールを かえる</button>
  </div>
  <div class="sim-desc">げんを ゆびで つまんで ひっぱり、はなすと「はじいた」おとが なるよ。つよく ひっぱるほど、おおきな おとに なって、ゆれも おおきくなる。「ながさ」スライダーで げんを みじかくすると たかい おと、ながくすると ひくい おとに かわるよ。がめんの なみの かたちが、そのまま おとの なみなんだ！ たかい おとほど、ゆれも こまかく はやく なるよ。</div>
</div>
<script>
(function(){
  const $=s=>document.querySelector(s);
  function cvPos(cv,e){const r=cv.getBoundingClientRect();
    return {x:(e.clientX-r.left)*(cv.width/r.width), y:(e.clientY-r.top)*(cv.height/r.height)};}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

  const cv=$("#gameCv");const W=720,H=560;cv.width=W;cv.height=H;
  function fitCanvas(){
    const box=cv.parentElement.getBoundingClientRect();
    const scale=Math.min(box.width/W, box.height/H);
    cv.style.width=(W*scale)+"px"; cv.style.height=(H*scale)+"px";
  }
  window.addEventListener("resize",fitCanvas); fitCanvas();
  const ctx=cv.getContext("2d");

  /* ===== Web Audio: オシレーター＋減衰エンベロープ ===== */
  let actx=null;
  function ensureAudio(){
    if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==="suspended")actx.resume();
  }
  function playPluck(freq,strength){
    ensureAudio();
    const t0=actx.currentTime;
    const decay=clamp(1.9*Math.pow(300/freq,0.35),0.7,2.4);
    const osc=actx.createOscillator();osc.type="sine";osc.frequency.setValueAtTime(freq,t0);
    const gain=actx.createGain();
    const peak=Math.min(0.85,0.12+strength*0.7);
    gain.gain.setValueAtTime(0.0001,t0);
    gain.gain.exponentialRampToValueAtTime(peak,t0+0.006);
    gain.gain.exponentialRampToValueAtTime(0.0001,t0+decay);
    osc.connect(gain).connect(actx.destination);
    osc.start(t0);osc.stop(t0+decay+0.05);
    return decay;
  }

  /* ===== げん（弦）: 6本、長さスライダーで まとめて 音の高さを変える ===== */
  const SCALES=[
    [261.63,293.66,329.63,392.00,440.00,523.25], // Cメジャー・ペンタトニック
    [220.00,246.94,261.63,293.66,329.63,392.00], // Aマイナー系（しっとり）
    [349.23,392.00,440.00,523.25,587.33,659.25], // Fペンタトニック（たかめ）
  ];
  const xStart=90,xFullEnd=630,yTop=110,yBottom=470,MAXBEND=70;
  let lengthMul=1,scaleIdx=0;
  const strings=[0,1,2,3,4,5].map(i=>({
    y:yTop+i*((yBottom-yTop)/5), baseFreq:SCALES[0][i], hue:Math.round(8+i*54),
    amp:0,t0:0,decay:0,freq:0,vibrating:false,
    dragPointerId:null,dragOffset:0,dragX:0}));
  function applyScale(){strings.forEach((s,i)=>s.baseFreq=SCALES[scaleIdx][i]);}

  function pluck(s,offset){
    const strength=clamp(Math.abs(offset)/MAXBEND,0.08,1);
    const freq=s.baseFreq/lengthMul;
    const decay=playPluck(freq,strength);
    s.amp=offset;s.freq=freq;s.decay=decay;s.t0=performance.now();s.vibrating=true;
  }

  const dragMap=new Map();
  function xEndNow(){return xStart+(xFullEnd-xStart)*lengthMul;}
  cv.addEventListener("pointerdown",e=>{
    ensureAudio();
    const p=cvPos(cv,e);const xe=xEndNow();
    let hit=-1,bd=34;
    strings.forEach((s,i)=>{
      if(p.x>=xStart-10&&p.x<=xe+10){const d=Math.abs(p.y-s.y);if(d<bd){bd=d;hit=i;}}
    });
    if(hit<0)return;
    cv.setPointerCapture(e.pointerId);
    dragMap.set(e.pointerId,hit);
    const s=strings[hit];
    s.dragPointerId=e.pointerId;s.dragX=clamp(p.x,xStart+8,xe-8);
    s.dragOffset=clamp(p.y-s.y,-MAXBEND,MAXBEND);s.vibrating=false;
  });
  cv.addEventListener("pointermove",e=>{
    if(!dragMap.has(e.pointerId))return;e.preventDefault();
    const s=strings[dragMap.get(e.pointerId)];const p=cvPos(cv,e);const xe=xEndNow();
    s.dragX=clamp(p.x,xStart+8,xe-8);s.dragOffset=clamp(p.y-s.y,-MAXBEND,MAXBEND);
  });
  function release(e){
    if(!dragMap.has(e.pointerId))return;
    const s=strings[dragMap.get(e.pointerId)];dragMap.delete(e.pointerId);
    s.dragPointerId=null;pluck(s,s.dragOffset);s.dragOffset=0;
  }
  cv.addEventListener("pointerup",release);
  cv.addEventListener("pointercancel",release);
  $("#lenR").oninput=e=>{lengthMul=+e.target.value;};
  $("#btnScale").onclick=()=>{scaleIdx=(scaleIdx+1)%SCALES.length;applyScale();};

  function drawString(s,now){
    const xe=xEndNow(),segs=48;
    ctx.beginPath();
    if(s.dragPointerId!=null){
      for(let k=0;k<=segs;k++){
        const x=xStart+(xe-xStart)*k/segs;
        const y=x<=s.dragX
          ? s.y+s.dragOffset*((x-xStart)/Math.max(1,s.dragX-xStart))
          : s.y+s.dragOffset*((xe-x)/Math.max(1,xe-s.dragX));
        k===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
    }else if(s.vibrating){
      const elapsed=(now-s.t0)/1000;
      if(elapsed>s.decay)s.vibrating=false;
      const env=s.amp*Math.exp(-elapsed*(4.6/Math.max(0.05,s.decay)));
      for(let k=0;k<=segs;k++){
        const frac=k/segs,x=xStart+(xe-xStart)*frac;
        const y=s.y+env*Math.sin(Math.PI*frac)*Math.cos(2*Math.PI*s.freq*elapsed);
        k===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
    }else{
      const idle=1.1*Math.sin(now*0.0016+s.y*0.05);
      for(let k=0;k<=segs;k++){
        const frac=k/segs,x=xStart+(xe-xStart)*frac;
        const y=s.y+idle*Math.sin(Math.PI*frac);
        k===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
    }
    ctx.strokeStyle=`hsl(${s.hue},80%,68%)`;ctx.lineWidth=3;ctx.lineCap="round";ctx.stroke();
    if(xe<xFullEnd-1){
      ctx.beginPath();ctx.moveTo(xe,s.y);ctx.lineTo(xFullEnd,s.y);
      ctx.strokeStyle="#ffffff33";ctx.lineWidth=2;ctx.setLineDash([4,5]);ctx.stroke();ctx.setLineDash([]);
    }
    ctx.fillStyle="#ffffffcc";
    ctx.beginPath();ctx.arc(xStart,s.y,4,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(xe,s.y,4,0,7);ctx.fill();
  }
  function frame(){
    ctx.fillStyle="#12193a";ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#ffffff18";ctx.fillRect(xStart-14,yTop-40,10,yBottom-yTop+80);
    const now=performance.now();
    strings.forEach(s=>drawString(s,now));
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
